spring.application.name=demo_backend

spring.datasource.url=jdbc:postgresql://localhost:5432/dislang_db
spring.datasource.username=lime_admin
spring.datasource.password=super_password_123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
#Add more schemas here if needed (Ex: ielts, billing,... )
spring.flyway.schemas=identity
spring.flyway.baseline-on-migrate=true

#Logging
logging.file.name=logs/dislang-backend.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.com.limerencer.demo_backend=INFO
logging.level.org.hibernate=WARN